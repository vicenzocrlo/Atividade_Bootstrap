    <div class="container mt-3">
        <h3>Contact</h3>
        <form class="row g-3">
            <div class="col-md-7 col-sm-12">
                <div class="form-floating">
                    <input type="text" name="name" id="name" class="form-control" placeholder="full name" required>
                    <label for="name">Full name</label>
                </div>
            </div>


            <div class="col-md-5 col-sm-12">
                <div class="form-floating">
                    <input type="email" name="email" id="email" class="form-control" placeholder="E-mail" required>
                    <label for="email">E-mail</label>
                </div>
            </div>

            <div class="col-md-4 col-sm-12">
                <div class="form-floating">
                    <input type="password" name="password" id="password" class="form-control" placeholder="Password"
                        required>
                    <label for="password">Password</label>
                </div>
            </div>

            <div class="col-md-4 col-sm-12">
                <div class="form-floating">
                    <input type="date" name="date" id="date" class="form-control" />
                    <label for="date">Date</label>
                </div>
            </div>

            <div class="col-md-4 col-sm-12">
                <div class="form-floating">
                    <select name="category" id="category" class="form-select" required>
                        <option value="" selected disabled>Selecione</option>
                        <option value="frontend">Frontend</option>
                        <option value="backend">Backend</option>
                    </select>
                    <label for="category">Category</label>
                </div>
            </div>

    <div class="col-md-4 col-sm-12">
        <label class="=form-label d-block">Type</label>
        <div class="form-check form-check-inline">
            <input type="radio" name="type" id="student" class="form-check-input">
            <label for="student" class="form-check-label">Student</label>
        </div>
        <div class="form-check form-check-inline">
            <input type="radio" name="type" id="teacher" class="form-check-input">
            <label for="teacher" class="form-check-label">Teacher</label>
        </div>
    </div>
    <div class="col-md-4 col-sm-12">
        <div class="form-check">
            <input type="checkbox" name="terms" id="terms" class="form-check-input" required>
            <label for="termos" class="form-check-label">Acept the terms</label>

        </div>
    </div>

    <div class="col-12">
        <button type="submit" class="btn btn-success">Invite</button>
        <button type="reset" class="btn btn-success">Clear</button>
        <button type="button" class="btn btn-success">Cancel</button>
    </div>
    </form>
    </div>
</div>
