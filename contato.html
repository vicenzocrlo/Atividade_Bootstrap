    <div class="container mt-3">
        <h3>Products</h3>
        <form class="row g-3">
            <div class="col-md-7 col-sm-12">
                <div class="form-floating">
                    <input type="text" name="name" id="name" class="form-control" placeholder="full name" required>
                    <label for="name">Product name</label>
                </div>
            </div>


            <div class="col-md-5 col-sm-12">
                <div class="form-floating">
                    <input type="number" name="number" id="price" class="form-control" placeholder="Price" step="0.5"
                        required>
                    <label for="price">Price</label>
                </div>
            </div>

            <div class="col-md-4 col-sm-12">
                <div class="form-floating">
                    <input type="number" name="quantity" id="quantity" class="form-control" placeholder="Quantity"
                        required>
                    <label for="quantity">Quantity</label>
                </div>
            </div>

            <div class="col-md-4 col-sm-12">
                <div class="form-floating">
                    <select name="category" id="category" class="form-select" required>
                        <option value="" selected disabled>Select</option>
                        <option value="alimentos">Animal feed</option>
                        <option value="saude">Health</option>
                        <option value="habitacao">Housing</option>
                    </select>
                    <label for="category">Category</label>
                </div>
            </div>

            <div class="col-md-4 col-sm-12">
                <div class="form-floating">
                    <input type="date" name="date" id="date" class="form-control" />
                    <label for="date">Made in</label>
                </div>
            </div>

            <div class="col-md-4 col-sm-12">
                <label class="=form-label d-block">Made from:</label>
                <div class="form-check form-check-inline">
                    <input type="radio" name="type" id="student" class="form-check-input">
                    <label for="student" class="form-check-label">SP</label>
                </div>
                <div class="form-check form-check-inline">
                    <input type="radio" name="type" id="teacher" class="form-check-input">
                    <label for="teacher" class="form-check-label">RJ</label>
                </div>
                <div class="form-check form-check-inline">
                    <input type="radio" name="type" id="teacher" class="form-check-input">
                    <label for="teacher" class="form-check-label">MG</label>
                </div>
            </div>
            <div class="col-12">
                <button type="submit" class="btn btn-success">Invite</button>
                <button type="reset" class="btn btn-warning">Clear</button>
                <button type="button" class="btn btn-danger">Cancel</button>
            </div>
        </form>
    </div>
    </div>
